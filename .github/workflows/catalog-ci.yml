name: Catalog CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vite+
        run: npm install -g vite-plus

      - name: Install dependencies
        run: vp install

      - name: Check
        run: vp check

      - name: Test
        run: vp test

      - name: Pack
        run: vp pm pack
